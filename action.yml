name: "prperf"
description: >
  Run a Ruby benchmark under rperf N times and upload the profiles to a
  prperf server (PR performance regression checks). Authenticates with the
  GitHub Actions OIDC token — no API keys to configure.
branding:
  icon: "trending-up"
  color: "red"

inputs:
  run:
    description: >
      Measurement command (required), e.g.
      "bundle exec rperf record --snapshot-dir $PRPERF_DIR -- ruby bench/main.rb".
      It must produce one or more .json.gz profiles (rperf >= 0.10).
    required: true
  count:
    description: "Number of measurement runs"
    required: false
    default: "3"
  benchmark:
    description: >
      Benchmark name for this measurement series (e.g. boot, endpoint1).
      A single commit can carry several benchmarks, each compared
      independently; use one action step per benchmark.
    required: false
    default: "default"
  thresholds:
    description: >
      Optional YAML mapping of thresholds for THIS benchmark; overrides the
      job-level defaults (env PRPERF_DEFAULT_THRESHOLDS) per key. Exceeding a
      threshold adds a ⚠️ and (per `comment`) a PR comment; it never fails
      the build. Keys: alloc / gc_count / total_ms / cpu_ms (value "+N%"
      relative or "+N" absolute) and method (mapping of method name to "N%"
      absolute share). Global defaults for ALL benchmarks go in a job-level
      "env: { PRPERF_DEFAULT_THRESHOLDS: | ... }" block (written once).
    required: false
    default: ""
  comment:
    description: >
      When to post the sticky PR comment: always | on_threshold | never.
    required: false
    default: "on_threshold"
  server:
    description: "prperf server origin"
    required: false
    default: "https://prperf.atdot.net"
  upload:
    description: "Upload the profiles (set to false for a dry run)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run rperf and upload profiles
      shell: bash
      run: "${{ github.action_path }}/run.sh"
      env:
        PRPERF_RUN: ${{ inputs.run }}
        PRPERF_COUNT: ${{ inputs.count }}
        PRPERF_BENCHMARK: ${{ inputs.benchmark }}
        PRPERF_THRESHOLDS: ${{ inputs.thresholds }}
        PRPERF_COMMENT: ${{ inputs.comment }}
        PRPERF_SERVER: ${{ inputs.server }}
        PRPERF_UPLOAD: ${{ inputs.upload }}
