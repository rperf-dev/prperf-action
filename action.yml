name: "prperf"
description: >
  Run a Ruby benchmark under rperf N times and upload the profiles to a
  prperf server (PR performance regression checks). Authenticates with the
  GitHub Actions OIDC token — no API keys to configure.
branding:
  icon: "trending-up"
  color: "red"

inputs:
  run:
    description: >
      Measurement command (required) — just the command you want to profile,
      e.g. "bin/rails runner \"\"" or "ruby bench/main.rb". The action wraps it
      in `rperf record` for you (using the bundle's rperf in a Bundler project,
      otherwise a freshly installed rperf). Set `record: false` to instead write
      the full `rperf record ... -- ...` command yourself.
    required: true
  record:
    description: >
      Wrap `run` in `rperf record` (default true). Set to false when `run`
      already invokes rperf itself (advanced/custom rperf flags); then it is run
      verbatim and must still emit one or more .json.gz profiles (rperf >= 0.11).
    required: false
    default: "true"
  rperf_version:
    description: >
      rperf gem version to install for the NON-Bundler path (no Gemfile). Empty
      installs the latest. Ignored when the project has a Gemfile (the bundle's
      rperf is used) or when record is false.
    required: false
    default: ""
  token:
    description: >
      GitHub token used to write the Check Run + sticky comment on PUBLIC repos
      (needs `checks: write` and `pull-requests: write`). Defaults to the
      workflow token. Private repos are written by the installed prperf App, not
      this token.
    required: false
    default: ${{ github.token }}
  prepare_run:
    description: >
      Optional one-time setup command, run ONCE before the measurement runs
      and NOT measured (e.g. generate fixtures, seed a DB, build assets).
      A failure here fails the step.
    required: false
    default: ""
  count:
    description: "Number of measurement runs"
    required: false
    default: "3"
  benchmark:
    description: >
      Benchmark name for this measurement series (e.g. boot, endpoint1).
      A single commit can carry several benchmarks, each compared
      independently; use one action step per benchmark.
    required: false
    default: "default"
  thresholds:
    description: >
      Optional YAML mapping of thresholds for THIS benchmark; overrides the
      job-level defaults (env PRPERF_DEFAULT_THRESHOLDS) per key. Exceeding a
      threshold adds a ⚠️ and (per `comment`) a PR comment; it never fails
      the build. Keys: alloc / gc_count / total_ms / cpu_ms (value "+N%"
      relative or "+N" absolute) and method (mapping of method name to "N%"
      absolute share). Global defaults for ALL benchmarks go in a job-level
      "env: { PRPERF_DEFAULT_THRESHOLDS: | ... }" block (written once).
    required: false
    default: ""
  comment:
    description: >
      When to post the sticky PR comment: always | on_threshold | never.
    required: false
    default: "on_threshold"
  server:
    description: "prperf server origin"
    required: false
    default: "https://prperf.atdot.net"
  upload:
    description: "Upload the profiles (set to false for a dry run)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run rperf and upload profiles
      shell: bash
      run: "${{ github.action_path }}/run.sh"
      env:
        PRPERF_RUN: ${{ inputs.run }}
        PRPERF_RECORD: ${{ inputs.record }}
        PRPERF_RPERF_VERSION: ${{ inputs.rperf_version }}
        PRPERF_PREPARE_RUN: ${{ inputs.prepare_run }}
        PRPERF_COUNT: ${{ inputs.count }}
        PRPERF_BENCHMARK: ${{ inputs.benchmark }}
        PRPERF_THRESHOLDS: ${{ inputs.thresholds }}
        PRPERF_COMMENT: ${{ inputs.comment }}
        PRPERF_SERVER: ${{ inputs.server }}
        PRPERF_UPLOAD: ${{ inputs.upload }}
        # Used to write the Check Run/comment with the workflow token on public,
        # install-free repos (no-op for installed repos — the App writes them).
        GH_TOKEN: ${{ inputs.token }}
